name: "Feature request / 功能建议"
description: "建议一个新功能或改进 / Suggest a feature or improvement"
labels: ["enhancement", "v0.57+ parking-lot"]
body:
  - type: markdown
    attributes:
      value: |
        **注意：v0.56.x 暂停新功能**，专注稳定性与信任。功能建议会被收集到 `v0.57+ parking-lot`，在稳定性 blocker 关闭后再评估——这不代表拒绝，只是排序。
        _v0.56.x pauses new features; requests are parked under `v0.57+ parking-lot` and revisited after stability blockers close._
  - type: textarea
    id: problem
    attributes:
      label: "要解决的问题 / Problem"
      description: "你遇到的实际痛点是什么？不要直接写解决方案。"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "设想的方案 / Proposal"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: "考虑过的替代方案 / Alternatives"
    validations:
      required: false
